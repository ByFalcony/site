<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByFalcon | AI, CTI & Security</title>
    <!-- Simple Icons or FontAwesome could be added here for icons -->
    <link rel="stylesheet" href="./src/styles/main.css">
</head>
<body>
    <canvas id="terminal-canvas"></canvas>
    <header>
        <nav>
            <div class="container nav-container">
                <a href="#home" class="logo">
                    <img src="./assets/logo.png" alt="Logo" class="logo-img">
                </a>
                <ul class="nav-links">
                    <li><a href="#home" class="nav-link">Home</a></li>
                    <li><a href="#blog" class="nav-link">Learning Log</a></li>
                    <li><a href="#about" class="nav-link">About</a></li>
                    <li><a href="#contact" class="nav-link">Contact</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <!-- Home / Hero Section -->
        <section id="home" class="section-padding container">
            <div id="hero-content">
                <!-- Injected via JavaScript from config.json -->
                <p class="loading">Loading...</p>
            </div>
        </section>

        <!-- Blog / Learning Log Section -->
        <section id="blog" class="section-padding container">
            <h2 class="section-title">Learning Log</h2>
            <div id="blog-grid" class="grid">
                <!-- Injected via JavaScript from blog.json -->
            </div>
        </section>

        <!-- About Section -->
        <section id="about" class="section-padding container">
            <div id="about-content">
                <!-- Injected via JavaScript -->
            </div>
        </section>

        <!-- Contact Section -->
        <section id="contact" class="section-padding container">
            <h2 class="section-title">Contact</h2>
            <div id="contact-links" class="grid">
                <!-- Injected via JavaScript -->
            </div>
        </section>
    </main>

    <footer class="container" style="padding: 2rem 0; font-size: 0.8rem; color: var(--text-muted); text-align: center; border-top: 1px solid var(--glass-border);">
        <p>&copy; 2026 ByFalcon. AI-Friendly Portfolio System.</p>
    </footer>

    <script type="module" src="./main.js"></script>
</body>
</html>
